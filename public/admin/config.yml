backend:
  name: github
  repo: wyshore/portfolio-site
  branch: main
  base_url: https://api.decapcms.org

media_folder: public/images
public_folder: /images

collections:
  - name: posts
    label: Project Posts
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        hint: "The project name shown at the top of the post"

      - label: Description
        name: description
        widget: string
        hint: "One sentence summary — shows up on the projects list and in Google"

      - label: Date
        name: date
        widget: date
        format: "YYYY-MM-DD"

      - label: Feature Image
        name: featureImage
        widget: image
        required: false
        hint: "Hero image shown at the top of the post and on the project card. Landscape works best."

      - label: Tags
        name: tags
        widget: list
        default: ["Engineering"]
        hint: "Comma-separated tags e.g. Engineering, Robotics, 3D Printing"

      - label: Content
        name: body
        widget: markdown
        hint: "Write your post here. Use the toolbar to add headings, images, bold text, etc."
